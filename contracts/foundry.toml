[profile.default]
src = "src"
out = "out"
libs = ["node_modules", "lib"]
solc_version = "0.8.25"
optimizer = true
optimizer_runs = 200
ffi = false
via_ir = false

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
sepolia = "${ETH_SEPOLIA_RPC_URL}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
